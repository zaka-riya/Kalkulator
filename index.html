<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white">

    <div id="calculator-body" class="glass-panel w-full max-w-xs rounded-3xl p-6 transition-all duration-300 status-glow-normal border-2 border-transparent">
        
        <div class="flex justify-between items-center mb-6">
            <span class="text-xs font-semibold tracking-widest text-gray-400 uppercase">Calculator</span>
            <div id="statusIndicator" class="flex items-center gap-2 px-3 py-1 rounded-full bg-black/20 text-xs font-medium text-blue-400">
                <span class="w-2 h-2 rounded-full bg-blue-400 animate-pulse"></span>
                Ready
            </div>
        </div>

        <div class="mb-6 text-right">
            <input type="text" id="display" 
                   class="w-full bg-transparent text-right text-5xl font-light text-white outline-none placeholder-gray-600" 
                   readonly 
                   placeholder="0">
        </div>

        <div class="grid grid-cols-4 gap-4">
            <button data-value="C" class="btn-calc h-14 w-14 rounded-2xl bg-cyan-900/40 text-cyan-300 hover:bg-cyan-800/60 font-semibold text-lg">C</button>
            <button data-value="DEL" class="btn-calc h-14 w-14 rounded-2xl bg-cyan-900/40 text-cyan-300 hover:bg-cyan-800/60 font-semibold text-xs">DEL</button>
            <button data-value="%" class="btn-calc h-14 w-14 rounded-2xl bg-cyan-900/40 text-cyan-300 hover:bg-cyan-800/60 font-semibold text-lg">%</button>
            <button data-value="/" class="btn-calc h-14 w-14 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-500 font-semibold text-xl shadow-lg shadow-indigo-500/30">÷</button>

            <button data-value="7" class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">7</button>
            <button data-value="8" class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">8</button>
            <button data-value="9" class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">9</button>
            <button data-value="*" class="btn-calc h-14 w-14 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-500 font-semibold text-xl shadow-lg shadow-indigo-500/30">×</button>

            <button data-value="4" class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">4</button>
            <button data-value="5" class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">5</button>
            <button data-value="6" class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">6</button>
            <button data-value="-" class="btn-calc h-14 w-14 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-500 font-semibold text-xl shadow-lg shadow-indigo-500/30">-</button>

            <button data-value="1" class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">1</button>
            <button data-value="2" class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">2</button>
            <button data-value="3" class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">3</button>
            <button data-value="+" class="btn-calc h-14 w-14 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-500 font-semibold text-xl shadow-lg shadow-indigo-500/30">+</button>

            <button data-value="0" class="btn-calc col-span-2 h-14 w-full rounded-2xl bg-white/5 hover:bg-white/10 text-xl pl-6 text-left">0</button>
            <button data-value="." class="btn-calc h-14 w-14 rounded-2xl bg-white/5 hover:bg-white/10 text-xl">.</button>
            <button data-value="=" class="btn-calc h-14 w-14 rounded-2xl bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold text-xl shadow-lg shadow-emerald-500/40">=</button>
        </div>

    </div>
<script src="script.jsx"></script>
</body>
</html>
